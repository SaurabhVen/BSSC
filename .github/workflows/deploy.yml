name: Deploy Frontend to AWS (Multi-Environment)

on:
  push:
    branches:
      - main
      - deploy/2026-07-08

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies and compile
        run: |
          npm install
          npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      # --- DEV DEPLOYMENT (Now targeting deploy/2026-07-08) ---
      - name: Deploy to Dev S3
        if: github.ref == 'refs/heads/deploy/2026-07-08'
        run: aws s3 sync ./dist s3://${{ vars.DEV_S3_BUCKET }} --delete

      - name: Invalidate Dev CloudFront Cache
        if: github.ref == 'refs/heads/deploy/2026-07-08'
        run: aws cloudfront create-invalidation --distribution-id ${{ vars.DEV_CLOUDFRONT_ID }} --paths "/*"

      # --- PRODUCTION DEPLOYMENT ---
      - name: Deploy to Production S3
        if: github.ref == 'refs/heads/main'
        run: aws s3 sync ./dist s3://${{ vars.PROD_S3_BUCKET }} --delete

      - name: Invalidate Production CloudFront Cache
        if: github.ref == 'refs/heads/main'
        run: aws cloudfront create-invalidation --distribution-id ${{ vars.PROD_CLOUDFRONT_ID }} --paths "/*"
