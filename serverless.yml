service: bssc-backend

frameworkVersion: '3'
useDotenv: true

plugins:
  - serverless-plugin-typescript
  - serverless-offline

package:
  individually: false
  excludeDevDependencies: true
  patterns:
    - '!node_modules/typescript/**'
    - '!node_modules/jest/**'
    - '!node_modules/drizzle-kit/**'
    - '!node_modules/eslint/**'
    - '!node_modules/prettier/**'
    - '!node_modules/ts-node/**'
    - '!node_modules/@types/**'
    - '!tests/**'
    - '!coverage/**'
    - '!.git/**'
    - '!.serverless/**'
    - '!.build/**'

provider:
  name: aws
  runtime: nodejs20.x
  region: ${opt:region, 'ap-south-1'}
  stage: ${opt:stage, 'dev'}
  memorySize: 512
  timeout: 29
  logRetentionInDays: 14
  versionFunctions: false
  httpApi:
    cors:
      allowedOrigins:
        - http://localhost:5173
        - https://jtglcce-2026.panjikaran.in
        - https://jtglcce-2026-demo.cyberica.in
      allowedHeaders:
        - Content-Type
        - Authorization
        - X-Api-Key
        - X-Requested-With
      allowedMethods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowCredentials: true

  environment:
    NODE_ENV: ${self:provider.stage}
    DATABASE_URL: ${env:DATABASE_URL, ssm:/candidate-portal/${self:provider.stage}/database-url}
    JWT_SECRET: ${env:JWT_SECRET, ssm:/candidate-portal/${self:provider.stage}/jwt-secret}
    S3_BUCKET: ${env:S3_BUCKET, '${self:provider.stage}-candidate-portal-documents'}
    MOCK_S3: ${env:MOCK_S3, 'false'}
    MOCK_PAYMENT: ${env:MOCK_PAYMENT, 'false'}
    MOCK_SMS_EMAIL: ${env:MOCK_SMS_EMAIL, 'false'}
    RAZORPAY_KEY_ID: ${env:RAZORPAY_KEY_ID, 'rzp_test_mock_key'}
    RAZORPAY_SECRET: ${env:RAZORPAY_SECRET, 'rzp_test_mock_secret'}
    GETEPAY_RETURN_URL: ${env:GETEPAY_RETURN_URL, 'http://localhost:3000/api/v1/payment/gateway/return'}
    FRONTEND_URL: ${env:FRONTEND_URL, 'http://localhost:5173'}

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:GetObject
            - s3:PutObject
            - s3:DeleteObject
          Resource:
            - arn:aws:s3:::${env:S3_BUCKET, '${self:provider.stage}-candidate-portal-documents'}/*
        - Effect: Allow
          Action:
            - secretsmanager:GetSecretValue
          Resource: '*'
        - Effect: Allow
          Action:
            - kms:Decrypt
          Resource: '*'


custom:
  serverless-offline:
    httpPort: 3000
    lambdaPort: 3002
    noPrependStageInUrl: false
    payloadLimit: '10mb'
    useChildProcesses: false

